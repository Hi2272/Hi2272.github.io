<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>G‑Code‑Editor & Visualisierung</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <!-- ==================== Kopfzeile (Steuerleiste) ==================== -->
        <div class="top-bar">
            <div class="group">
                <label for="penUpInput">PenUp</label>
                <input type="text" id="penUpInput" value="M3 S0">
            </div>

            <div class="group">
                <label for="penDownInput">PenDown</label>
                <input type="text" id="penDownInput" value="M3 S20">
            </div>

            <!-- Konvertieren & Kopieren – zunächst hidden -->
            <button id="convertBtn" class="btn convert hidden">Konvertieren</button>
            <button id="copyBtn"    class="btn copy    hidden">Kopieren</button>
        </div>

        <!-- ==================== Hauptbereich (zweispaltig) ==================== -->
        <div class="main">
            <!-- Textarea – linke Hälfte -->
            <textarea id="myTextarea"
                      placeholder="Fügen Sie einen GCode aus der Zwischenablage ein"></textarea>

            <!-- Rechte Hälfte – Info‑Panel -->
            <div class="info-panel">
                <!-- Minimal‑Werte -->
                <div class="info-row">
                    <label for="minXInput">min‑X (mm)</label>
                    <input type="number" id="minXInput" step="0.001" placeholder="–">
                </div>
                <div class="info-row">
                    <label for="minYInput">min‑Y (mm)</label>
                    <input type="number" id="minYInput" step="0.001" placeholder="–">
                </div>

                <!-- Breite / Höhe (Differenz) -->
                <div class="info-row">
                    <label for="widthInput">Breite (mm)</label>
                    <input type="number" id="widthInput" step="0.001" placeholder="–">
                </div>
                <div class="info-row">
                    <label for="heightInput">Höhe (mm)</label>
                    <input type="number" id="heightInput" step="0.001" placeholder="–">
                </div>

                <!-- Checkbox: Seitenverhältnis behalten (standardmäßig aktiviert) -->
                <div class="info-row">
                    <label for="keepAspectRatio">Seitenverhältnis behalten</label>
          
                    <input type="checkbox" id="keepAspectRatio" checked>
                </div>

                <!-- Canvas (50 % der Höhe des rechten Panels) -->
                <canvas id="gcodeCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
